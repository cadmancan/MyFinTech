name: Update Investor Feed

# Runs every weekday at 21:30 UTC (5:30 PM ET in winter, 4:30 PM ET in summer)
# That's just after the US market closes at 4:00 PM ET.
on:
  schedule:
    - cron: '30 21 * * 1-5'
  # Also allow manual triggering from the Actions tab
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit feed.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run feed builder
        env:
          # SEC requires automated tools to identify themselves with a contact email.
          # Set this in repo Settings → Secrets and variables → Actions
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python scripts/fetch_data.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update feed: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
