name: Update Investor Feed

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run feed builder
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python scripts/fetch_data.py

      # Robust commit-and-push: handles the case where main has moved
      # since the workflow checked out (manual edits, prior runs, etc.)
      # by rebasing onto whatever's current and retrying up to 3 times.
      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update feed: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Try push, rebase + retry on rejection
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing on latest main and retrying"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts"
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
